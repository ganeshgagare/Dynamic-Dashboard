# render.yaml — Render Blueprint (corrected)
# Deploys PostgreSQL + Spring Boot backend + React frontend in one click

services:
  # ── 1. Spring Boot Backend (Docker) ────────────────────────
  - type: web
    name: datapulse-backend
    env: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    envVars:
      - key: DB_HOST
        fromDatabase:
          name: datapulse-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: datapulse-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: datapulse-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: datapulse-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: datapulse-db
          property: password
      - key: CORS_ALLOWED_ORIGINS
        value: https://datapulse-frontend.onrender.com
      - key: PORT
        value: "8081"

  # ── 2. React / Vite Frontend (Static Site) ─────────────────
  - type: web
    name: datapulse-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://datapulse-backend.onrender.com
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

# ── 3. PostgreSQL Database ──────────────────────────────────
databases:
  - name: datapulse-db
    plan: free
    databaseName: dashboard_db
    user: datapulse_user
