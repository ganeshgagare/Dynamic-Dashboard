# render.yaml — Render Blueprint
# Deploys all three services (DB + Backend + Frontend) in one click

services:
  # ── 1. Spring Boot Backend ─────────────────────────────────
  - type: web
    name: datapulse-backend
    runtime: java
    plan: free
    rootDir: backend
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/dashboard-backend-0.0.1-SNAPSHOT.jar
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: datapulse-db
          property: jdbcInternalConnectionString
      - key: DATABASE_USERNAME
        fromDatabase:
          name: datapulse-db
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: datapulse-db
          property: password
      - key: CORS_ALLOWED_ORIGINS
        value: https://datapulse-frontend.onrender.com
      - key: PORT
        value: "8081"

  # ── 2. React / Vite Frontend ────────────────────────────────
  - type: web
    name: datapulse-frontend
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://datapulse-backend.onrender.com
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

# ── 3. PostgreSQL Database ──────────────────────────────────
databases:
  - name: datapulse-db
    plan: free
    databaseName: dashboard_db
    user: postgres
