# render.yaml — Render Blueprint
# NOTE: Database must be created MANUALLY on Render first (free tier only allows 1 DB).
# After creating it, link the env vars manually on the backend service.

services:
  # ── 1. Spring Boot Backend (Docker) ────────────────────────
  - type: web
    name: datapulse-backend
    env: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    envVars:
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        value: https://datapulse-frontend.onrender.com
      - key: PORT
        value: "8081"

  # ── 2. React / Vite Frontend (Static Site) ─────────────────
  - type: web
    name: datapulse-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://datapulse-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
