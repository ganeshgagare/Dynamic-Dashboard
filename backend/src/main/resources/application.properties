spring.application.name=dashboard-backend

# PostgreSQL — built from individual Render env vars
# Locally falls back to localhost defaults
spring.datasource.url=jdbc:postgresql://${DB_HOST:127.0.0.1}:${DB_PORT:5432}/${DB_NAME:dashboard_db}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:Ganesh@2003}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate — validate ensures schema matches entities; Flyway manages DDL
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Flyway — baseline-on-migrate allows running on an existing (pre-Flyway) database
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.locations=classpath:db/migration

# Server
server.port=${PORT:8081}

# CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# JWT — MUST be overridden in production with a strong random secret (min 32 chars).
# Set the JWT_SECRET environment variable; the application will refuse to start
# if the default value is detected and the active profile is not "dev".
app.jwt.secret=${JWT_SECRET:ThisIsADefaultSecretKeyThatMustBeOverriddenInProduction!!}
app.jwt.expiration-ms=86400000

# DataSource endpoint — comma-separated list of allowed DB hostnames
app.datasource.allowed-hosts=${DS_ALLOWED_HOSTS:localhost,127.0.0.1}
