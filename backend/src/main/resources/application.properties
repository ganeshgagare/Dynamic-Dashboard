spring.application.name=dashboard-backend

# PostgreSQL — reads from env vars (set in Railway/Render)
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://127.0.0.1:5432/dashboard_db}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:Ganesh@2003}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Server
server.port=${PORT:8081}

# CORS — reads from env var; fallback to localhost for development
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}
